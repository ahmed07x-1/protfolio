<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Participant ID</title>
</head>
<body>

    <h1>Exercise 3: Determine Whether a Participant ID is Prime</h1>

    <script>

        // Hardcoded participant ID
        let participantID = 47;

        // Assume ID is prime
        let isPrime = true;

        // Check divisors from 2 to square root of ID
        for (let i = 2; i <= Math.sqrt(participantID); i++) {

            if (participantID % i === 0) {
                isPrime = false;
                break;
            }

        }

        // Display result
        console.log("Participant ID: " + participantID);

        if (isPrime) {
            console.log("The Participant ID is Prime (Lucky ID)");
        } else {
            console.log("The Participant ID is Not Prime");
        }

    </script>

</body>
</html>
