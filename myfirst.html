<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FoodieFrenzy</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color: #f5efe8;
        }

        /* Hero Section */

        .hero{
            background-color: #ff6f61;
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .hero h1{
            font-size: 55px;
            margin-bottom: 15px;
        }

        .hero p{
            font-size: 22px;
            margin-bottom: 25px;
        }

        .btn{
            display: inline-block;
            background-color: white;
            color: #ff6f61;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn:hover{
            background-color: #ffe5e0;
        }

        /* Popular Dishes */

        .dishes{
            text-align: center;
            padding: 60px 20px;
        }

        .dishes h2{
            font-size: 40px;
            color: #7a4e3a;
            margin-bottom: 40px;
        }

        .dish-container{
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .dish-card{
            background-color: white;
            width: 200px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .dish-card img{
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .dish-card h3{
            margin: 15px 0 10px;
            color: #333;
        }

        .dish-card a{
            display: inline-block;
            margin-bottom: 15px;
            color: #ff6f61;
            text-decoration: none;
            font-weight: bold;
        }

        .dish-card a:hover{
            color: #d94f45;
        }

        /* Footer */

        footer{
            background-color: #333;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        footer p{
            margin-bottom: 20px;
        }

        .top-btn{
            display: inline-block;
            background-color: #ff6f61;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .top-btn:hover{
            background-color: #ff4f40;
        }

    </style>

</head>

<body>

    <!-- Hero Section -->

    <section class="hero" id="top">

        <h1>Craving Something Desi?</h1>

        <p>India's Street Flavours Delivered Fast</p>

        <a href="#popular" class="btn">Order Now</a>

    </section>

    <!-- Popular Dishes -->

    <section class="dishes" id="popular">

        <h2>Popular Dishes</h2>

        <div class="dish-container">

            <!-- Dish 1 -->

            <div class="dish-card">

                <img src="logo/pav-bhaji.png" alt="Pav Bhaji">

                <h3>Pav Bhaji</h3>

                <a href="#top">Order Now</a>

            </div>

            <!-- Dish 2 -->

            <div class="dish-card">

                <img src="logo/vada-pav.png" alt="Vada Pav">

                <h3>Vada Pav</h3>

                <a href="#top">Order Now</a>

            </div>

            <!-- Dish 3 -->

            <div class="dish-card">

                <img src="logo/masala-dosa.png" alt="Masala Dosa">

                <h3>Masala Dosa</h3>

                <a href="#top">Order Now</a>

            </div>

            <!-- Dish 4 -->

            <div class="dish-card">

                <img src="logo/chole-bature.png" alt="Chole Bhature">

                <h3>Chole Bhature</h3>

                <a href="#top">Order Now</a>

            </div>

            <!-- Dish 5 -->

            <div class="dish-card">

                <img src="logo/pani-puri.png" alt="Pani Puri">

                <h3>Pani Puri</h3>

                <a href="#top">Order Now</a>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <p>Ready for your Desi Feast?</p>

        <a href="#top" class="top-btn">Back to Top</a>

    </footer>

</body>

</html>
