<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4 - Welcome Message</title>
</head>
<body>

    <h1>Exercise 4: Display Customized Welcome Message</h1>

    <script>

        // Function Definition
        function displayWelcomeMessage(participantName) {

            console.log("Welcome, " + participantName + "! Ready for the fun?");
        }

        // Function Call for 3 Participants
        displayWelcomeMessage("Ahmed");
        displayWelcomeMessage("Mohd Younus");
        displayWelcomeMessage("Ayesha");

    </script>

</body>
</html>
