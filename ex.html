<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5 - Average Score</title>
</head>
<body>

    <h1>Exercise 5: Calculate Average Score</h1>

    <script>

        // Function Definition
        function calculateAverageScore(score1, score2, score3) {

            const average = (score1 + score2 + score3) / 3;

            return average;
        }

        // Function Usage
        const avg1 = calculateAverageScore(85, 90, 80);
        const avg2 = calculateAverageScore(70, 75, 65);

        // Output Display
        console.log("Average score for participant set 1:", avg1);
        console.log("Average score for participant set 2:", avg2);

    </script>

</body>
</html>
