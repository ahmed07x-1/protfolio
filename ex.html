<script>

function calculateAverageScore(score1, score2, score3) {

    let average = (score1 + score2 + score3) / 3;

    return average;
}

let avg1 = calculateAverageScore(85, 90, 80);
let avg2 = calculateAverageScore(70, 75, 65);

console.log(avg1);
console.log(avg2);

</script>
