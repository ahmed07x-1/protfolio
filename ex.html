<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5 - Average Score</title>
</head>
<body>

    <h1>Exercise 5: Calculate Average Score</h1>

    <script>

        // Function to calculate average score
        function calculateAverageScore(score1, score2, score3) {

            let average = (score1 + score2 + score3) / 3;

            return average;
        }

        // First participant scores
        let average1 = calculateAverageScore(85, 90, 80);

        // Second participant scores
        let average2 = calculateAverageScore(70, 75, 65);

        // Display result
        console.log("Average Score of Participant Set 1: " + average1);
        console.log("Average Score of Participant Set 2: " + average2);

    </script>

</body>
</html>
